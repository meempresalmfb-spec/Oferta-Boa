<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Oferta Boa, canal de ofertas</title>
  <!-- Redirect estatico pro canal do WhatsApp. A Meta nao aceita link de WhatsApp
       direto no anuncio (erro #2446433), entao o anuncio aponta pra esta pagina
       do proprio dominio e ela encaminha pro canal.
       O refresh de 2s e so FALLBACK pra navegador sem JS; com JS o script abaixo
       redireciona em 400ms, depois de carimbar PageView + Lead no pixel. -->
  <meta http-equiv="refresh" content="2; url=https://whatsapp.com/channel/0029Vb895rjB4hdbk2ZJ8r3R" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff7ef;
      color: #2b2320;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 380px;
      width: 100%;
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #e8590c;
      margin-bottom: 20px;
    }
    .msg {
      font-size: 17px;
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 22px;
      border: 3px solid #f0d9c4;
      border-top-color: #e8590c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      background: #e8590c;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 13px 22px;
      border-radius: 999px;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #8a7d74;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Oferta Boa</div>
    <div class="spinner" aria-hidden="true"></div>
    <p class="msg">Te levando pro canal de ofertas no WhatsApp...</p>
    <a class="btn" href="https://whatsapp.com/channel/0029Vb895rjB4hdbk2ZJ8r3R">Abrir o canal</a>
    <p class="hint">Se nada acontecer em alguns segundos, toca no botao acima.</p>
  </main>
  <script>
    // Pixel da Meta (pagina estatica: o ID e colado aqui, MESMO valor do
    // metaPixelId em src/config.ts). VAZIO = nao carrega nada, so redireciona.
    var PIXEL_ID = "1211274402070181";

    if (PIXEL_ID) {
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
      n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
      document,'script','https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', PIXEL_ID);
      fbq('track', 'PageView');
      // Chegar aqui = ir pro canal, entao o Lead e a propria passagem.
      fbq('track', 'Lead', { content_name: 'canal' });
    }

    // Espera 400ms pros eventos sairem antes de encaminhar (replace = nao
    // deixa esta pagina no historico). Sem pixel, o delay e imperceptivel.
    setTimeout(function () {
      window.location.replace("https://whatsapp.com/channel/0029Vb895rjB4hdbk2ZJ8r3R");
    }, 400);
  </script>
</body>
</html>
